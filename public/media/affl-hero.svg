<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">AFFL Wrapped</title>
  <desc id="desc">Twelve seasons of fantasy football history, rebuilt as an interactive data story.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11110f"/>
      <stop offset="0.6" stop-color="#191816"/>
      <stop offset="1" stop-color="#24130f"/>
    </linearGradient>
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="14" r="1" fill="#fff" opacity=".08"/>
      <circle cx="62" cy="45" r="1.3" fill="#fff" opacity=".05"/>
      <circle cx="35" cy="78" r=".8" fill="#fff" opacity=".06"/>
    </pattern>
    <clipPath id="frame"><rect width="1600" height="720" rx="28"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1600" height="720" fill="url(#field)"/>
    <rect width="1600" height="720" fill="url(#grain)"/>
    <path d="M1010-80 1700 80v360L920 260Z" fill="#1e56d8" opacity=".72"/>
    <path d="m1160 340 520 120v330L980 620Z" fill="#e63b2e" opacity=".9"/>
    <circle cx="1390" cy="610" r="270" fill="none" stroke="#fff" stroke-opacity=".14" stroke-width="2"/>
    <circle cx="1390" cy="610" r="190" fill="none" stroke="#fff" stroke-opacity=".1" stroke-width="54"/>
    <g transform="translate(86 74) rotate(-3)">
      <rect width="172" height="172" fill="#e63b2e"/>
      <path d="M0 86h172M86 0v172" stroke="#fff" stroke-opacity=".34"/>
      <g fill="#fff" font-family="Arial Narrow,Arial,sans-serif" font-size="66" font-weight="900" text-anchor="middle">
        <text x="43" y="69">A</text><text x="129" y="69">F</text><text x="43" y="155">F</text><text x="129" y="155">L</text>
      </g>
      <rect x="14" y="188" width="172" height="14" fill="#f2c84b"/>
    </g>
    <text x="86" y="350" fill="#f2ecdf" font-family="Arial Narrow,Arial,sans-serif" font-size="145" font-weight="900" letter-spacing="-6">AFFL WRAPPED</text>
    <text x="92" y="410" fill="#f2c84b" font-family="Courier New,monospace" font-size="20" font-weight="700" letter-spacing="4">THE LEAGUE HISTORY ENGINE</text>
    <text x="92" y="472" fill="#c7c0b4" font-family="Arial,sans-serif" font-size="25">Every title. Every upset. Every impossible schedule.</text>
    <g transform="translate(92 552)">
      <g fill="#f2ecdf" font-family="Arial Narrow,Arial,sans-serif" font-weight="900">
        <text x="0" y="38" font-size="48">12</text><text x="210" y="38" font-size="48">1,128</text><text x="470" y="38" font-size="48">20,548</text><text x="790" y="38" font-size="48">2014-25</text>
      </g>
      <g fill="#8f887c" font-family="Courier New,monospace" font-size="13" font-weight="700" letter-spacing="2">
        <text x="0" y="68">SEASONS</text><text x="210" y="68">MATCHUPS</text><text x="470" y="68">LINEUP RECORDS</text><text x="790" y="68">FULL ARCHIVE</text>
      </g>
    </g>
    <text x="1510" y="670" fill="#fff" opacity=".75" font-family="Courier New,monospace" font-size="13" text-anchor="end" letter-spacing="2">OPEN DATA STORY / LIVE ON GITHUB PAGES</text>
  </g>
</svg>
